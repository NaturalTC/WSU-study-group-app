version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: wsu-studygroup-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wsu_study_group
      MYSQL_USER: studyuser
      MYSQL_PASSWORD: studypassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
